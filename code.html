<!DOCTYPE html>
<html>
<head>
<title>AI Digital Traffic Enforcement System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
background:black;
padding:15px;
font-size:24px;
text-align:center;
}

.container{
display:flex;
}

.sidebar{
width:230px;
background:#111;
height:100vh;
padding:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
background:#333;
color:white;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#00c3ff;
}

.content{
flex:1;
padding:25px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button.action{
background:#00c3ff;
border:none;
padding:10px 15px;
color:white;
cursor:pointer;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid gray;
}

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.chart{
height:200px;
display:flex;
align-items:flex-end;
gap:10px;
margin-top:10px;
}

.bar{
width:30px;
background:#00c3ff;
}

.link{
color:#00c3ff;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="login">

<h2>🚦 Traffic System Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button class="action" onclick="login()">Login</button>

<div id="otpBox" style="display:none">

<input id="otp" placeholder="Enter OTP">
<button class="action" onclick="verifyOTP()">Verify OTP</button>

</div>

<p id="loginMsg"></p>

<p class="link" onclick="showSignup()">Create Account</p>

</div>

<!-- SIGNUP -->

<div id="signupPage" class="login" style="display:none">

<h2>Signup</h2>

<input id="signupUser" placeholder="Username">
<input id="signupPass" type="password" placeholder="Password">

<button class="action" onclick="signup()">Signup</button>

<p id="signupMsg"></p>

<p class="link" onclick="showLogin()">Back to Login</p>

</div>

<!-- SYSTEM -->

<div id="system" style="display:none">

<header>
AI Digital Traffic Enforcement System
<button onclick="logout()" style="float:right">Logout</button>
</header>

<div class="container">

<div class="sidebar">

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('add')">Add Violation</button>
<button onclick="show('records')">Records</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="cameraDetect()">📷 Camera Detect</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard" class="card">

<h3>Dashboard</h3>

<p>Total Violations: <span id="total">0</span></p>
<p>Repeat Offenders: <span id="repeat">0</span></p>

</div>

<!-- ADD VIOLATION -->

<div id="add" class="card" style="display:none">

<h3>Add Violation</h3>

<input id="vehicle" placeholder="Vehicle Number">

<select id="type">
<option>Helmet Violation</option>
<option>Signal Jump</option>
<option>Over Speed</option>
<option>Seatbelt Violation</option>
</select>

<input id="fine" placeholder="Fine Amount">

<button class="action" onclick="addViolation()">Submit</button>

</div>

<!-- RECORDS -->

<div id="records" class="card" style="display:none">

<h3>Violation Records</h3>

<table>

<thead>

<tr>
<th>Vehicle</th>
<th>Violation</th>
<th>Fine</th>
<th>Score</th>
<th>Payment</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="card" style="display:none">

<h3>Fine Analytics</h3>

<div class="chart" id="chart"></div>

</div>

</div>
</div>

</div>

<script>

let violations=[]
let currentOTP=""

/* vehicle database */

let vehicleDB=[
{number:"AP09AB1234",owner:"Rahul",license:"DL12345"},
{number:"TS07XY4567",owner:"Arjun",license:"DL99882"},
{number:"KA01CD7890",owner:"Suresh",license:"DL77766"}
]

/* signup */

function signup(){

let user=document.getElementById("signupUser").value
let pass=document.getElementById("signupPass").value

let users=JSON.parse(localStorage.getItem("users")||"[]")

users.push({user,pass})

localStorage.setItem("users",JSON.stringify(users))

document.getElementById("signupMsg").innerText="Account Created"

}

/* login */

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let users=JSON.parse(localStorage.getItem("users")||"[]")

let found=users.find(u=>u.user==user && u.pass==pass)

if(found){

currentOTP=Math.floor(1000+Math.random()*9000)

alert("OTP Sent: "+currentOTP)

document.getElementById("otpBox").style.display="block"

}else{

document.getElementById("loginMsg").innerText="Invalid Login"

}

}

function verifyOTP(){

let otp=document.getElementById("otp").value

if(otp==currentOTP){

document.getElementById("loginPage").style.display="none"
document.getElementById("system").style.display="block"

}else{

alert("Wrong OTP")

}

}

function logout(){

location.reload()

}

function showSignup(){

document.getElementById("loginPage").style.display="none"
document.getElementById("signupPage").style.display="flex"

}

function showLogin(){

document.getElementById("signupPage").style.display="none"
document.getElementById("loginPage").style.display="flex"

}

/* navigation */

function show(id){

["dashboard","add","records","analytics"].forEach(x=>{
document.getElementById(x).style.display="none"
})

document.getElementById(id).style.display="block"

}

/* add violation */

function addViolation(){

let vehicle=document.getElementById("vehicle").value
let type=document.getElementById("type").value
let fine=parseInt(document.getElementById("fine").value)

let score=100-fine/10

violations.push({vehicle,type,fine,score})

verifyLicense(vehicle)
getLocation()
sendEmail(vehicle,fine)
sendSMS(vehicle,fine)

updateTable()
updateDashboard()
updateChart()

}

/* license verify */

function verifyLicense(vehicle){

let found=vehicleDB.find(v=>v.number==vehicle)

if(found){

alert("License Verified\nOwner: "+found.owner)

}else{

alert("Vehicle not found in DB")

}

}

/* location */

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

console.log("Location:",pos.coords.latitude,pos.coords.longitude)

})

}

}

/* email simulation */

function sendEmail(vehicle,fine){

console.log("Email sent for",vehicle,"fine",fine)

}

/* sms simulation */

function sendSMS(vehicle,fine){

console.log("SMS alert sent")

}

/* update table */

function updateTable(){

let html=""

violations.forEach(v=>{

html+=`

<tr>

<td>${v.vehicle}</td>
<td>${v.type}</td>
<td>${v.fine}</td>
<td>${v.score}</td>
<td><button onclick="payFine('${v.vehicle}',${v.fine})">Pay</button></td>

</tr>

`

})

document.getElementById("table").innerHTML=html

}

/* dashboard */

function updateDashboard(){

document.getElementById("total").innerText=violations.length

let vehicles=violations.map(v=>v.vehicle)

let unique=new Set(vehicles)

document.getElementById("repeat").innerText=violations.length-unique.size

}

/* chart */

function updateChart(){

let chart=document.getElementById("chart")

chart.innerHTML=""

violations.forEach(v=>{

let bar=document.createElement("div")

bar.className="bar"

bar.style.height=v.fine/2+"px"

chart.appendChild(bar)

})

}

/* payment */

function payFine(vehicle,fine){

let ok=confirm("Pay ₹"+fine+" ?")

if(ok){

alert("UPI Payment Successful")

downloadChallan(vehicle,fine)

}

}

/* challan download */

function downloadChallan(vehicle,fine){

let text="Traffic Challan\nVehicle:"+vehicle+"\nFine:"+fine

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="challan_"+vehicle+".txt"

a.click()

}

/* camera detection */

function cameraDetect(){

let vehicles=["AP09AB1234","TS07XY4567","KA01CD7890"]

let detected=vehicles[Math.floor(Math.random()*vehicles.length)]

alert("Camera detected vehicle: "+detected)

}

</script>

</body>
</html>
